# reusable-pr-check-node.yml — DRAFT v0.1.0
#
# Status: PLACEHOLDER — not yet extracted from any repo.
# Do not use until validated against a real repo.
#
# Purpose: PR validation for Node.js/TypeScript repos.
# Trigger: called by repo workflows on pull_request to main.
# Does NOT deploy, mutate, or access secrets.

name: PR Check (Node)

on:
  workflow_call:
    inputs:
      node_version:
        description: "Node.js version"
        required: false
        type: string
        default: "22"
      working_directory:
        description: "Path to package (relative to repo root)"
        required: false
        type: string
        default: "."
      install_command:
        description: "Install command"
        required: false
        type: string
        default: "npm ci"
      build_command:
        description: "Build command (leave empty to skip)"
        required: false
        type: string
        default: ""
      test_command:
        description: "Test command"
        required: false
        type: string
        default: "npm test"
      lint_command:
        description: "Lint command (leave empty to skip)"
        required: false
        type: string
        default: ""

jobs:
  validate:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ${{ inputs.working_directory }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ inputs.node_version }}
          cache: npm
          cache-dependency-path: ${{ inputs.working_directory }}/package-lock.json

      - name: Install dependencies
        run: ${{ inputs.install_command }}

      - name: Type check
        if: inputs.build_command != ''
        run: ${{ inputs.build_command }}

      - name: Lint
        if: inputs.lint_command != ''
        run: ${{ inputs.lint_command }}

      - name: Test
        run: ${{ inputs.test_command }}
