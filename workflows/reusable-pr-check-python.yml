#
# Purpose: PR validation for Python repos.
# Trigger: called by repo workflows on pull_request to main.
# Does NOT deploy, mutate, or access secrets.

name: PR Check (Python)

on:
  workflow_call:
    inputs:
      python_version:
        description: "Python version"
        required: false
        type: string
        default: "3.12"
      working_directory:
        description: "Path to package (relative to repo root)"
        required: false
        type: string
        default: "."
      requirements_file:
        description: "Path to requirements.txt (leave empty to skip pip install)"
        required: false
        type: string
        default: "requirements.txt"
      lint_command:
        description: "Lint command (leave empty to skip)"
        required: false
        type: string
        default: "ruff check ."
      test_command:
        description: "Test command (leave empty to skip)"
        required: false
        type: string
        default: "python -m pytest"

jobs:
  validate:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ${{ inputs.working_directory }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ inputs.python_version }}

      - name: Install dependencies
        if: inputs.requirements_file != ''
        run: |
          python -m pip install --upgrade pip
          pip install -r ${{ inputs.requirements_file }}

      - name: Compile check
        run: python -m compileall .

      - name: Lint
        if: inputs.lint_command != ''
        run: ${{ inputs.lint_command }}

      - name: Test
        if: inputs.test_command != ''
        run: ${{ inputs.test_command }}
